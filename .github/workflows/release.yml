name: Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  package:
    name: Build package artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Set up npm for trusted publishing
        run: npm install -g npm@11.18.0
      - name: Install dependencies
        run: npm ci
      - name: Verify release version contract
        run: npm run release:verify
      - name: Build and test
        run: npm test
      - name: Create npm package tarballs
        run: |
          rm -rf .evidoc/release
          mkdir -p .evidoc/release
          for package in packages/*; do
            if [ -f "$package/package.json" ]; then
              npm pack "./$package" --pack-destination .evidoc/release
            fi
          done
      - name: Smoke test npx package
        run: npm run release:smoke:npx -- .evidoc/release
      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: evidoc-packages
          path: .evidoc/release/*.tgz
      - name: Generate release notes
        run: npm run release:notes > .evidoc/release/RELEASE_NOTES.md
      - name: Publish packages to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          package_dirs=(
            packages/core
            packages/reports
            packages/graph
            packages/frontmatter
            packages/dashboard
            packages/patcher
            packages/local-app
            packages/review-log
            packages/mcp-server
            packages/github-action
            packages/cli
            packages/evidoc
          )

          for package_dir in "${package_dirs[@]}"; do
            name="$(node -e "console.log(require('./${package_dir}/package.json').name)")"
            version="$(node -e "console.log(require('./${package_dir}/package.json').version)")"
            tarball_name="$(node -e "const p=require('./${package_dir}/package.json'); process.stdout.write(p.name.replace(/^@/, '').replace('/', '-') + '-' + p.version + '.tgz')")"
            tarball=".evidoc/release/${tarball_name}"
            if [ ! -f "$tarball" ]; then
              echo "Verified package artifact is missing: $tarball" >&2
              exit 1
            fi

            local_integrity="sha512-$(openssl dgst -sha512 -binary "$tarball" | openssl base64 -A)"
            if registry_output="$(npm view "${name}@${version}" dist.integrity --json 2>&1)"; then
              published_integrity="$(node -e 'const value=JSON.parse(process.argv[1]); if (typeof value !== "string") process.exit(1); process.stdout.write(value)' "$registry_output")"
              if [ "$published_integrity" != "$local_integrity" ]; then
                echo "Published package integrity mismatch for ${name}@${version}." >&2
                echo "registry: $published_integrity" >&2
                echo "local:    $local_integrity" >&2
                exit 1
              fi
              echo "Verified existing package artifact: ${name}@${version}"
              continue
            fi
            if ! grep -q 'E404' <<< "$registry_output"; then
              echo "Unable to verify registry state for ${name}@${version}; refusing to publish." >&2
              echo "$registry_output" >&2
              exit 1
            fi

            if npm publish "$tarball" --access public; then
              continue
            fi

            for attempt in {1..6}; do
              echo "Registry has not propagated ${name}@${version}; retrying (${attempt}/6)."
              sleep $((attempt * 5))
              if registry_output="$(npm view "${name}@${version}" dist.integrity --json 2>&1)"; then
                published_integrity="$(node -e 'const value=JSON.parse(process.argv[1]); if (typeof value !== "string") process.exit(1); process.stdout.write(value)' "$registry_output")"
                if [ "$published_integrity" != "$local_integrity" ]; then
                  echo "Published package integrity mismatch for ${name}@${version} after publish failure." >&2
                  exit 1
                fi
                echo "Verified propagated package artifact: ${name}@${version}"
                break
              fi
              if [ "$attempt" = 6 ]; then
                echo "Unable to publish or verify ${name}@${version}." >&2
                echo "$registry_output" >&2
                exit 1
              fi
            done
          done

          rm -rf .evidoc/registry-release
          mkdir -p .evidoc/registry-release
          for package_dir in "${package_dirs[@]}"; do
            name="$(node -e "console.log(require('./${package_dir}/package.json').name)")"
            version="$(node -e "console.log(require('./${package_dir}/package.json').version)")"
            tarball_name="$(node -e "const p=require('./${package_dir}/package.json'); process.stdout.write(p.name.replace(/^@/, '').replace('/', '-') + '-' + p.version + '.tgz')")"
            for attempt in {1..6}; do
              if registry_metadata="$(npm view "${name}@${version}" dist.integrity dist.tarball --json 2>&1)"; then
                break
              fi
              if [ "$attempt" = 6 ]; then
                echo "Unable to read registry metadata for ${name}@${version}." >&2
                echo "$registry_metadata" >&2
                exit 1
              fi
              echo "Registry metadata has not propagated ${name}@${version}; retrying (${attempt}/6)."
              sleep $((attempt * 5))
            done
            registry_integrity="$(node -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(value["dist.integrity"])' "$registry_metadata")"
            registry_tarball="$(node -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(value["dist.tarball"])' "$registry_metadata")"
            local_tarball=".evidoc/release/${tarball_name}"
            local_integrity="sha512-$(openssl dgst -sha512 -binary "$local_tarball" | openssl base64 -A)"
            downloaded=".evidoc/registry-release/${tarball_name}"
            curl --fail --location --silent --show-error "$registry_tarball" --output "$downloaded"
            downloaded_integrity="sha512-$(openssl dgst -sha512 -binary "$downloaded" | openssl base64 -A)"
            if [ "$downloaded_integrity" != "$registry_integrity" ]; then
              echo "Downloaded registry artifact integrity mismatch for ${name}@${version}." >&2
              exit 1
            fi
            if [ "$downloaded_integrity" != "$local_integrity" ]; then
              echo "Downloaded registry artifact does not match locally verified release artifact for ${name}@${version}." >&2
              exit 1
            fi
          done
      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: .evidoc/registry-release/*.tgz
          body_path: .evidoc/release/RELEASE_NOTES.md
