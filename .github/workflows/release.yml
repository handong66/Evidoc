name: Release Artifacts

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish packages to npm.
        required: false
        default: "false"
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  package:
    name: Build package artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: https://registry.npmjs.org
      - name: Set up npm for trusted publishing
        run: npm install -g npm@11.18.0
      - name: Install dependencies
        run: npm ci
      - name: Build and test
        run: npm test
      - name: Create npm package tarballs
        run: |
          rm -rf .evidoc/release
          mkdir -p .evidoc/release
          for package in packages/*; do
            if [ -f "$package/package.json" ]; then
              npm pack "./$package" --pack-destination .evidoc/release
            fi
          done
      - name: Smoke test npx package
        run: npm run release:smoke:npx -- .evidoc/release
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evidoc-packages
          path: .evidoc/release/*.tgz
      - name: Generate release notes
        run: npm run release:notes > .evidoc/release/RELEASE_NOTES.md
      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .evidoc/release/*.tgz
          body_path: .evidoc/release/RELEASE_NOTES.md
      - name: Publish packages to npm
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish == 'true' }}
        run: |
          publish_package() {
            package_dir="$1"
            name="$(node -e "console.log(require('./${package_dir}/package.json').name)")"
            version="$(node -e "console.log(require('./${package_dir}/package.json').version)")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; already published."
            else
              npm publish "./${package_dir}" --access public
            fi
          }

          publish_package packages/core
          publish_package packages/reports
          publish_package packages/graph
          publish_package packages/frontmatter
          publish_package packages/dashboard
          publish_package packages/local-app
          publish_package packages/review-log
          publish_package packages/patcher
          publish_package packages/mcp-server
          publish_package packages/github-action
          publish_package packages/cli
          publish_package packages/evidoc
